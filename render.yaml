databases:
  - name: navya-db
    databaseName: navya_db
    user: navya_user
    plan: free # Optional: specifies the free tier

services:
  # 1. Backend (FastAPI)
  - type: web
    name: navya-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: navya-db
          property: connectionString
