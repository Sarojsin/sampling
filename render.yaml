services:
  # 1. Database
  - type: database
    name: navya-db
    databaseName: navya_db
    user: navya_user

  # 2. Backend (FastAPI)
  - type: web
    name: navya-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: navya-db
          property: connectionString

  # 3. Frontend (React)
  - type: web
    name: navya-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: navya-backend
          property: host
