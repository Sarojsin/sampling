databases:
  - name: navya-db
    databaseName: navya_db
    user: navya_user
    plan: free

services:
  - type: web
    name: navya-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: navya-db
          property: connectionString

  - type: web
    name: navya-frontend
    env: static
    rootContext: frontend
    buildCommand: if "%WINDIR%"=="C:\WINDOWS" (npm install && npm run build && xcopy /Y public\h_redirects build\h_redirects /I) else (npm install && npm run build && cp public/h_redirects build/h_redirects)
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: navya-backend
          property: host
